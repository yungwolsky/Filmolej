version: "3.9"

services:
  backend:
    build:
        context: ..
        dockerfile: infrastructure/docker/FilmolejBackend.Dockerfile
    ports:
        - "5000:8080"
    depends_on:
        - db
    volumes:
        - ../storage/media:/media
        - ../storage/streams:/streams
    env_file:
        - ../.env

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
      POSTGRES_DB: mediaserver
    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: